<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naviga</title>
    <link rel="stylesheet" href="newtab.css">
</head>
<body>
    <div class="app">
        <!-- Navigation -->
        <nav class="nav">
            <div class="nav-logo">Naviga</div>
            <div class="nav-tabs" id="navTabs">
                <!-- Dynamically generated by JS -->
            </div>
            <div class="nav-actions">
                <button class="nav-btn" id="settingsBtn" title="Settings">
                    <i data-lucide="settings" style="width:16px;height:16px;"></i>
                </button>
            </div>
        </nav>

        <!-- Toolbar (hidden in All view) -->
        <div class="toolbar" id="toolbar" style="display:none;">
            <div class="stats" id="stats-text">0 bookmarks</div>
        </div>

        <!-- Main Content -->
        <main id="main-content"></main>
    </div>

    <!-- Overlay -->
    <div class="overlay" id="overlay"></div>

    <!-- Settings Panel -->
    <div class="settings-panel" id="settingsPanel">
        <div class="settings-header">
            <h2>Settings</h2>
            <button class="close-settings" id="closeSettings">✕</button>
        </div>
        <div class="setting-group">
            <label>Appearance</label>
            <div class="appearance-options">
                <button class="appearance-btn" data-appearance="light" title="Light">
                    <div class="appearance-preview light-preview">
                        <div class="ap-bar"></div>
                        <div class="ap-lines">
                            <div class="ap-line"></div>
                            <div class="ap-line short"></div>
                        </div>
                    </div>
                    <span>Light</span>
                </button>
                <button class="appearance-btn" data-appearance="dark" title="Dark">
                    <div class="appearance-preview dark-preview">
                        <div class="ap-bar"></div>
                        <div class="ap-lines">
                            <div class="ap-line"></div>
                            <div class="ap-line short"></div>
                        </div>
                    </div>
                    <span>Dark</span>
                </button>
                <button class="appearance-btn" data-appearance="system" title="System">
                    <div class="appearance-preview system-preview">
                        <div class="ap-half light-half"></div>
                        <div class="ap-half dark-half"></div>
                        <div class="ap-bar"></div>
                    </div>
                    <span>System</span>
                </button>
            </div>
        </div>
        <div class="setting-group">
            <label>Background</label>
            <select id="bgGradientPreset">
                <option value="dark">Default</option>
                <option value="dark-gray">Subtle</option>
                <option value="deep">Deep</option>
                <option value="blue">Blue Tint</option>
                <option value="warm">Warm Tint</option>
            </select>
        </div>
        <div class="setting-group">
            <label>Clicks per Gradient Level</label>
            <input type="number" id="clicksPerLevel" value="100" min="1" max="1000">
        </div>
        <div class="setting-group">
            <label>Workspace Card Display</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="cardDisplay" value="both" checked> Icon + Text</label>
                <label class="radio-option"><input type="radio" name="cardDisplay" value="icon"> Icon Only</label>
                <label class="radio-option"><input type="radio" name="cardDisplay" value="text"> Text Only</label>
            </div>
        </div>
        <div class="setting-group">
            <label>Icon Size</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="iconSize" value="small"> Small</label>
                <label class="radio-option"><input type="radio" name="iconSize" value="medium" checked> Medium</label>
                <label class="radio-option"><input type="radio" name="iconSize" value="large"> Large</label>
            </div>
        </div>
        <div class="setting-group">
            <label>Tab Display</label>
            <div class="radio-group">
                <label class="radio-option"><input type="radio" name="tabDisplay" value="both" checked> Icon + Text</label>
                <label class="radio-option"><input type="radio" name="tabDisplay" value="icon"> Icon Only</label>
                <label class="radio-option"><input type="radio" name="tabDisplay" value="text"> Text Only</label>
            </div>
        </div>
        <div class="setting-group">
            <label>Language</label>
            <select id="languageSelect">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
            </select>
        </div>
        <div class="setting-group workspace-colors">
            <label>Workspace Appearance</label>
            <div id="workspaceColorsList">
                <!-- Dynamically generated -->
            </div>
        </div>
        <div class="setting-group">
            <label>Import Bookmarks</label>
            <p class="setting-hint">Import workspaces from a Chrome/Edge bookmarks JSON file (workspaces_v2)</p>
            <input type="file" id="importFileInput" accept=".json" style="display:none;">
            <button class="import-btn" id="importBtn">
                <i data-lucide="upload" style="width:14px;height:14px;"></i> Choose File
            </button>
            <div id="importStatus" class="import-status" style="display:none;"></div>
        </div>
        <button class="save-settings" id="saveSettings">Save Settings</button>
    </div>

    <!-- Context Menu -->
    <div class="context-menu" id="contextMenu"></div>

    <!-- Edit Modal -->
    <div class="modal" id="editModal">
        <div class="modal-content">
            <div class="modal-header" id="editModalHeader">Edit Bookmark</div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="editTitle">
            </div>
            <div class="form-group">
                <label>Icon Source</label>
                <select id="editIconType">
                    <option value="favicon">Favicon</option>
                    <option value="emoji">Emoji</option>
                    <option value="lucide">Lucide Icons</option>
                    <option value="icons8">Icons8</option>
                    <option value="iconfont">Iconfont.cn</option>
                </select>
            </div>
            <div class="form-group" id="editIconValueGroup">
                <label id="editIconLabel">Icon Value</label>
                <input type="text" id="editIconValue" placeholder="e.g., github, star, heart">
            </div>
            <div class="form-group">
                <label>URL</label>
                <input type="text" id="editUrl">
            </div>
            <div class="modal-actions">
                <button class="btn-secondary" id="cancelEdit">Cancel</button>
                <button class="btn-primary" id="saveEdit">Save</button>
            </div>
        </div>
    </div>

    <!-- Sub-bookmark Dropdown -->
    <div class="sub-bookmark-dropdown" id="subBookmarkDropdown"></div>

    <script src="vendor/lucide.min.js"></script>
    <script src="newtab.js"></script>
</body>
</html>
